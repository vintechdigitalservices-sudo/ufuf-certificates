<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDUF Africa Certificate Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700;900&display=swap');

:root { --primary:#004aad; --accent:#ff7a00; }

body {
  font-family: Montserrat, sans-serif;
  background: #f0f2f5;
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
}

.form-container {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  width: 95%;
  max-width: 450px;
  margin-bottom: 20px;
  box-sizing: border-box;
}

label { font-weight:700; font-size:13px; display:block; margin-bottom:5px; }
input, select { width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom:12px; font-family:inherit; box-sizing: border-box; }

.date-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; padding:10px; background:#fafafa; border:1px solid #ddd; border-radius:6px; margin-bottom:15px; }
.date-item { text-align:center; padding:5px; border:1px solid #ccc; cursor:pointer; border-radius:4px; background:#fff; font-size:10px; }
.date-item.selected { background:var(--primary); color:#fff; }

button { width:100%; padding:14px; border:none; border-radius:6px; font-weight:700; cursor:pointer; transition:0.3s; }
#genBtn { background:var(--accent); color:#fff; margin-top: 10px; }
#downloadBtn { background:#27ae60; color:#fff; display:none; width:auto; padding:12px 40px; margin: 20px auto; }

#usageInfo { text-align: center; font-size: 14px; font-weight: bold; color: var(--primary); margin: -5px 0 15px 0; }

#previewWrapper {
  display: none;
  width: 100%;
  max-width: 1000px;
  overflow: hidden; 
  margin-top: 20px;
}

.canvas-scaler {
  width: 1000px;
  height: 706px;
  transform-origin: top left;
  margin-bottom: 20px;
}

#certArea {
  width: 1000px;
  height: 706px;
  position: relative;
  background: #fff url('background.webp') no-repeat center/cover;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(0,0,0,0.1);
}

/* Logos aligned strictly inside border */
#mainLogo { position:absolute; top:50px; left:80px; width:80px; height:auto; }
#eventLogo { position:absolute; top:50px; right:80px; width:160px; height:auto; object-fit: contain; }

.content-body {
    position: absolute;
    top: 230px; 
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

#certText_Static1 { font-weight:900; letter-spacing:0.15em; font-size:18px; margin-bottom: 12px; color:#000; }

#outName { 
    font-family:'Cinzel', serif; 
    font-size:38px; 
    color:#8c6d1f; 
    padding-bottom: 5px;
    border-bottom: 2.5px solid #d4af37;
    min-width: 550px;
    margin-bottom: 18px;
    text-transform: uppercase;
}

#outParticipation { font-weight:900; font-size:18px; margin-bottom: 8px; color:#000; }
#outEvent { font-size:28px; font-weight:900; color:#e31e24; line-height:1.1; margin-bottom: 8px; max-width: 85%; }

#outThemeMain { font-weight:900; font-size:15px; color:#8c6d1f; margin-top: 5px; }
#outThemeSub { font-weight:700; font-size:13px; color:#8c6d1f; margin-bottom: 15px; font-style: italic; }

#outDetails { font-weight:700; line-height:1.4; font-size:14.5px; color: #333; }

#imgSeal { 
    position: absolute; 
    bottom: 80px; 
    left: 50%; 
    transform: translateX(-50%); 
    width: 105px; 
    height: auto;
    z-index: 10;
}

.sig-container { position:absolute; bottom:65px; width:250px; text-align:center; }
#sigLeft { left:80px; } 
#sigRight { right:80px; }
.sig-img { height:70px; width:auto; margin-bottom: 5px; }
.sig-line { border-top:2px solid #d4af37; width:100%; margin-bottom: 5px; }
.sig-name { font-weight:900; font-size:13.5px; margin:0; color:#000; }
.sig-title { font-size:11.5px; font-weight:800; color:#444; margin:0; }

#footerID { position:absolute; bottom:25px; right:70px; font-weight:900; font-size:16px; color:#000; }

</style>
</head>

<body>

<div class="form-container">
  <h2 style="text-align:center; color:var(--primary); margin-top:0;">UDUF Portal</h2>
  <label>Access Code</label>
  <input id="accessCodeInput" type="text" placeholder="Enter Access Code">
  <p id="usageInfo">Remaining generations: Checking...</p>
  
  <label>Participant Name</label>
  <input id="inName" placeholder="ENTER FULL NAME">
  
  <label>Select Event</label>
  <select id="inEvent">
    <option value="ACTIVE LEADERSHIP AND ENTREPRENEURSHIP BOOTCAMP">Active Leadership and Entrepreneurship Bootcamp</option>
    <option value="UNDER 45 CEOs SUMMIT">Under 45 CEOs Summit</option>
    <option value="AFRICAN DAY CELEBRATION">African day celebration</option>
    <option value="INTERNATIONAL YOUTH DAY">International youth day</option>
  </select>
  
  <label>Select Month & Year</label>
  <div style="display:flex; gap:10px;">
      <select id="inMonth">
        <option selected>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
      </select>
      <input id="inYear" value="2026" type="number">
  </div>
  
  <label>Select Date(s)</label>
  <div id="datePicker" class="date-grid"></div>
  
  <button id="genBtn" onclick="generateCertificate()">GENERATE CERTIFICATE</button>
</div>

<div id="previewWrapper">
    <div class="canvas-scaler" id="scaler">
        <div id="certArea">
            <img id="mainLogo" src="uduf_logo.webp">
            <img id="eventLogo" src="bootcamp_logo.webp">
            
            <div class="content-body">
                <div id="certText_Static1">THIS IS TO CERTIFY THAT</div>
                <div id="outName"></div>
                <div id="outParticipation"></div>
                <div id="outEvent"></div>
                <div id="outThemeMain"></div>
                <div id="outThemeSub"></div>
                <div id="outDetails"></div>
            </div>

            <img id="imgSeal" src="seal.webp">

            <div id="sigLeft" class="sig-container">
              <img src="president_sig.webp" class="sig-img">
              <div class="sig-line"></div>
              <p class="sig-name">Ezuma Smart Chinedu PhD.</p>
              <p class="sig-title">Founding President</p>
            </div>

            <div id="sigRight" class="sig-container">
              <img src="director_sig.webp" class="sig-img">
              <div class="sig-line"></div>
              <p class="sig-name">Chukwuekezie ThankGod</p>
              <p class="sig-title">Director, ALEB 2026</p>
            </div>

            <div id="footerID">CAC/IT/NO 103111</div>
        </div>
    </div>
</div>

<button id="downloadBtn" onclick="downloadPDF()">DOWNLOAD PDF</button>

<script>
    const CONFIG = {
        STORAGE_KEY: 'uduf_final_v2',
        MAX_GENERATIONS: 3,
        ACCESS_CODE: 'BOOTCAMP-2026'
    };

    function getUsage() {
        return parseInt(localStorage.getItem(CONFIG.STORAGE_KEY)) || 0;
    }

    function updateUsageDisplay() {
        const used = getUsage();
        const remain = Math.max(0, CONFIG.MAX_GENERATIONS - used);
        document.getElementById('usageInfo').innerText = `Remaining generations: ${remain} of ${CONFIG.MAX_GENERATIONS}`;
        if(remain <= 0) {
            document.getElementById('genBtn').disabled = true;
            document.getElementById('genBtn').innerText = "LIMIT REACHED";
        }
    }
    updateUsageDisplay();

    const datePicker = document.getElementById("datePicker");
    let selectedDates = [];
    for(let i=1; i<=31; i++) {
        let d = document.createElement("div"); d.className="date-item"; d.innerText=i;
        d.onclick=function(){ 
            this.classList.toggle("selected");
            const val = parseInt(this.innerText);
            if(selectedDates.includes(val)) selectedDates = selectedDates.filter(x => x !== val);
            else selectedDates.push(val);
            selectedDates.sort((a,b)=>a-b);
        };
        datePicker.appendChild(d);
    }

    // Function to calculate and apply scale for mobile preview
    function adjustScale() {
        const wrapper = document.getElementById('previewWrapper');
        const scaler = document.getElementById('scaler');
        const scale = wrapper.offsetWidth / 1000;
        scaler.style.transform = `scale(${scale})`;
        wrapper.style.height = (706 * scale) + "px";
    }
    window.addEventListener('resize', adjustScale);

    function generateCertificate() {
        const code = document.getElementById('accessCodeInput').value.trim();
        if(code !== CONFIG.ACCESS_CODE) return alert("Invalid Access Code");
        
        const used = getUsage();
        if(used >= CONFIG.MAX_GENERATIONS) return alert("Generation limit reached.");

        const name = document.getElementById('inName').value;
        if(!name || selectedDates.length === 0) return alert("Please enter Name and select Dates");

        document.getElementById('outName').innerText = name;
        document.getElementById('outParticipation').innerText = `Fully participated in a ${selectedDates.length} day${selectedDates.length > 1 ? 's' : ''}`;
        document.getElementById('outEvent').innerText = document.getElementById('inEvent').value;
        
        document.getElementById('outThemeMain').innerText = "THEME: INNOVATE, LEAD AND GROW";
        document.getElementById('outThemeSub').innerText = "Strategies for Entrepreneurial Success";

        const suffix = n => n + (n%10==1&&n%100!=11?'st':n%10==2&&n%100!=12?'nd':n%10==3&&n%100!=13?'rd':'th');
        const dateStr = selectedDates.map(suffix).join(", ");
        document.getElementById('outDetails').innerHTML = `Held on the ${dateStr} day of ${document.getElementById('inMonth').value} ${document.getElementById('inYear').value} at<br>Onitsha Business School Executive Hall, GRA Onitsha, Anambra State.`;

        localStorage.setItem(CONFIG.STORAGE_KEY, (used + 1).toString());
        updateUsageDisplay();

        document.getElementById('previewWrapper').style.display = "block";
        document.getElementById('downloadBtn').style.display = "block";
        adjustScale();
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function downloadPDF() {
        const btn = document.getElementById('downloadBtn');
        const scaler = document.getElementById('scaler');
        const wrapper = document.getElementById('previewWrapper');
        const area = document.getElementById('certArea');
        
        btn.innerText = "Processing...";

        // --- THE FIX ---
        // 1. Store current scale to restore later
        const originalTransform = scaler.style.transform;
        const originalWrapperHeight = wrapper.style.height;

        // 2. Temporarily set scale to 1 for perfect high-res capture
        scaler.style.transform = "scale(1)";
        wrapper.style.height = "706px";

        try {
            // Capture the area at high resolution (scale 2)
            const canvas = await html2canvas(area, { 
                scale: 2,
                useCORS: true, 
                logging: false,
                allowTaint: true
            });

            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            // Create PDF in Landscape orientation
            const pdf = new jsPDF('l', 'px', [1000, 706]);
            pdf.addImage(imgData, 'PNG', 0, 0, 1000, 706);
            pdf.save("UDUF_Certificate.pdf");
        } catch (error) {
            console.error("PDF Generation Error:", error);
            alert("Error generating PDF. Please try again.");
        } finally {
            // 3. Restore mobile scaling
            scaler.style.transform = originalTransform;
            wrapper.style.height = originalWrapperHeight;
            btn.innerText = "DOWNLOAD PDF";
        }
    }
</script>
</body>
</html>
